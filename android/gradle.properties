# Memory settings
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# AndroidX support
android.useAndroidX=true

# Kotlin incremental compilation (optional disable)
kotlin.incremental=false

# ===== Network / Download stability fixes =====
org.gradle.internal.http.connectionTimeout=600000
org.gradle.internal.http.socketTimeout=600000

# Optional (improves build performance sometimes)
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true